<!doctype html>
<html lang="en">
  <head>
    <title>User Form</title>
 <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
 <script src="productadd.js"></script>
  </head>
  <body>
    <header>
      <iframe src="navbar.html" style="width: 100%; border: none;"></iframe>
    </header>
    <div class="container mt-4">
      <div class="row justify-content-center">
        <div class="col-md-4">
          <div class="card shadow">
            <div class="card-body">
   
      <form onsubmit="return validate()">
           <h3 class="text-center">Product Registration Form</h3>
        <input id="pname" class="form-control mb-2" type="text" placeholder="Enter Product Name"/>
        <div id="nameErr" class="text-danger small mb-2"></div>
        
        <br />

        <input id="price"  class="form-control mb-2" type="number" placeholder="Enter Price" />
        <div id="passErr" class="text-danger small mb-2"></div>
        <br />

        <input id="image"  class="form-control mb-2" type="text" placeholder="Enter Image URL" /><br />
<input id="cat"  class="form-control mb-2" type="text" placeholder="Enter Category" /><br />
         
        <button class="btn btn-primary w-100">Register Product</button>
      </form>
      </div>
      </div>
      </div>
      </div>
    </div>
  </body>
</html>
